<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polaris</title>
    <link rel="stylesheet" href="./dist/output.css">
    <link rel="stylesheet" href="./src/input.css">
    <link rel="shortcut icon" href="./img/polarisIcon.png" type="image/x-icon">
    <link href="node_modules/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-[#fcfcfc]">
    <header class="flex items-center justify-between px-14 py-2 bg-blue-600 shadow-xl">
        <img src="./img/polaris.png" alt="" class="w-32">
        <div class="flex items-center gap-8">
            <a href=".//pages/login.html" class="flex items-center bg-white px-2 gap-1 rounded-xs">Login<i class="bi bi-box-arrow-in-right"></i></a>
        </div>
    </header>
    <main class="flex">
        <div class="flex flex-col py-10 w-72 min-h-screen bg-white gap-4 shadow-xl ">
            <span id="fecharMenu" class="flex gap-4 px-6 text-xl  py-2 cursor-pointer"><i class="bi bi-list"></i></span>
            <span class="flex gap-4 px-6 text-xl  hover:bg-gray-100 py-2 cursor-pointer transition-all duration-300 ease-in-out"><i class="bi bi-sun"></i>Meu Dia</span>
            <span class="flex gap-4 px-6 text-xl  hover:bg-gray-100 py-2 cursor-pointer transition-all duration-300 ease-in-out"><i class="bi bi-star"></i>Importante</span>
            <span class="flex gap-4 px-6 text-xl  hover:bg-gray-100 py-2 cursor-pointer transition-all duration-300 ease-in-out"><i class="bi bi-calendar4-week"></i>Planejado</span>
            <span class="flex gap-4 px-6 text-xl  hover:bg-gray-100 py-2 cursor-pointer transition-all duration-300 ease-in-out"><i class="bi bi-person"></i>Atribuído a mim</span>
            <span class="flex gap-4 px-6 text-xl  hover:bg-gray-100 py-2 cursor-pointer transition-all duration-300 ease-in-out"><i class="bi bi-house-door"></i>Tarefas</span>
            <hr class="w-64 mx-4  h-[1px] text-[#dddddd]">
            <div class="flex mt-2">
                <span class="flex gap-4 px-6 hover:bg-gray-100 py-2 cursor-pointer transition-all duration-300 ease-in-out">
                    <i class="bi bi-plus-lg text-blue-500"></i>
                    <input type="text" id="" placeholder="Nova lista" class="border-none focus:outline-none focus:placeholder:text-[#70757a] placeholder:text-blue-500">
                </span>
            </div>
        </div>
        <div class="flex flex-col">
            <div class="flex mt-20">
                <div class="flex items-center gap-4 bg-white shadow-lg p-2 ml-10">
                    <div class="flex gap-4 pl-6 py-2 cursor-pointer">
                        <i class="bi bi-plus-lg text-blue-500"></i>
                        <input type="text" id="inputLista" placeholder="Nova lista" class="border-none w-[1000px] focus:outline-none  focus:placeholder:text-[#70757a] placeholder:text-blue-500">
                    </div>
                </div>
                <button id="botaoAdicionar" class="bg-emerald-200 py-2 px-4 w-28 rounded-tr-md rounded-br-md hover:bg-emerald-500 cursor-pointer transition-all duration-300 ease-in">Adicionar</button>
            </div>
            
             <div id="mostrarTarefa" class="flex flex-col gap-2 opacity-0 -translate-y-full transition-all duration-500 ease-out"></div> <!-- DIV tarefa criada-->
            <div id="divErro" class="hidden px-6 py-4 ml-10 mt-10 w-96 rounded opacity-0 -translate-x-full transition-all duration-500 ease-out bg-red-400"></div> <!-- DIV ERROR-->
        </div>
    </main>
    <script src="./scripts/scripts.js"></script>
</body>
</html>
