<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../src/input.css">
    <link rel="stylesheet" href="../dist/output.css">
    <link rel="shortcut icon" href="../img/polarisIcon.png" type="image/x-icon">
</head>
<body class="bg-[#fcfcfc]">
    <div></div>
    <div class="flex flex-col justify-center items-center h-[80vh]">
            <form id="form" action="" class="flex flex-col items-center gap-6 bg-white shadow-2xl rounded-[20px] p-12">
                <h1 class="text-3xl">Pôlaris</h1>
                <div class="flex flex-col gap-4">
                    <input id="email" type="email" placeholder="E-mail" class="border border-[#ccc] py-2 px-4 w-64 rounded-[20px] text-[#70757a] focus:outline-none ">
                    <input id="senha" type="password" placeholder="Password" class="border border-[#ccc] py-2 px-4 w-64 rounded-[20px] text-[#70757a] focus:outline-none ">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-1">
                            <input type="checkbox" name="" id="" class="">
                            <label for="" class="text-sm">Lembrar</label>
                        </div>
                        <p class="text-sm">Esqueceu a senha?</p>
                    </div>
                    <button class="flex justify-center text-white bg-blue-400 py-2 px-4 transition-all duration-500 ease-in-out rounded-[20px] hover:bg-blue-500 cursor-pointer">Entrar</button>
                </div>
            </form>
    </div>
        <div id="divErro" class="hidden px-6 py-4 ml-10 w-80 rounded opacity-0 -translate-x-full transition-all duration-500 ease-out text-white bg-red-700"></div>
        <div id="divSucesso" class="hidden px-6 py-4 ml-10 w-80 rounded opacity-0 -translate-x-full transition-all duration-500 ease-out text-white bg-green-700"></div>
    <script src="../scripts/login.js"></script>
</body>
</html>
